<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragle</title>
  <link rel="stylesheet" href="/styles/dragle.css">
</head>
<body>
  
    
    
  
  <header>
    <div class="buttonsHeader"><img src="/assets/info.png" alt="icon-information" id="icon-information"></div>
    <div class="logoHeader"><h1>dragle</h1></div>
    <div class="buttonsHeader"><img src="/assets/stats.png" alt="icon-stats" id="icon-stats"></div>
  </header>
  
  <div id="formContainer">
    <form action="post" id="dragleForm">
      <input type="text" list="dragQueens" id="dragName" name="fullName">
      <datalist id="dragQueens">
    </datalist>
    <button type="submit" id="gussBtn">Guess</button>
    </form>

    <div id="resultContainer" class="hidden">
      <h4 id="finalAnswer"></h4>
      <button id="shareButton">Share results</button>
    </div>
  </div>
  

  
  <div id="dragTags">
    <p class="dragTag hidden" id="franchise"></p>
    <p class="dragTag hidden" id="season"></p>
    <p class="dragTag hidden" id="alternativeQueen">Alternative Queen</p>
    <p class="dragTag hidden" id="pageantQueen">Peagent Queen</p>
    <p class="dragTag hidden" id="fashionQueen">Fashion Queen</p>
    <p class="dragTag hidden" id="comedyQueen">Comedy Queen</p>
    <p class="dragTag hidden" id="lipsyncAssassin">Lipsync Assassin</p>
    <p class="dragTag hidden" id="wonSnatchGame">Won Snatch Game</p>
    <p class="dragTag hidden" id="wonMissCongeniality">Miss Congeniality</p>
    <p class="dragTag hidden" id="seasonWinner">Season Winner</p>
  </div>

  <div id="pastGuessesContainer"></div>

  <div id="endModal" class="modal">
    <div class="modalContent">
      <button id="closeModal" class="close">&times;</button>
      <h3 id="endPhrase"></h3>
      <p id="answer"></p>
      <button id="shareButtonModal">Share results</button>
      <p id="nextGame">New drag in CONTADORRRRR</p>
      <div id="statistics">
        <div class="statsBox">
          <p class="played statsNumber"></p>
          <p class="statsText">Played</p>
        </div>
        <div class="statsBox">
          <p class="won statsNumber"></p>
          <p class="statsText">Won</p>
        </div>
        <div class="statsBox">
          <p class="currentStreakNum statsNumber"></p>
          <p class="statsText">Current Streak</p>
        </div>
        <div class="statsBox">
          <p class="longestStreakNum statsNumber"></p>
          <p class="statsText">Longest Streak</p>
        </div>
      </div>
    </div>
  </div>


  <div id="statsModal" class="modal">
    <div class="modalContent">
      <button id="closeStatsModal" class="close">&times;</button>
      <h3>Your stats:</h3>
      <div id="statisticsContent">
        <div class="statsBox">
          <p class="statsPlayed statsNumber"></p>
          <p class="statsText">Played</p>
        </div>
        <div class="statsBox">
          <p class="statsWon statsNumber"></p>
          <p class="statsText">Won</p>
        </div>
        <div class="statsBox">
          <p class="statsCurrentStreakNum statsNumber"></p>
          <p class="statsText">Current Streak</p>
        </div>
        <div class="statsBox">
          <p class="statsLongestStreakNum statsNumber"></p>
          <p class="statsText">Longest Streak</p>
        </div>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modalContent">
      <button id="closeInfoModal" class="close">&times;</button>
      <h3>How to play:</h3>
      
    </div>
  </div>

  <button id="start" class="hiddenn">Restart game</button>
<script type="module" src="/scripts/app.js"></script>
</body>
</html>
