<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>

  <!-- ---------------- estilos compartilhados entre login e signup ---------------- -->
  <link rel="stylesheet" href="styles/acesso.css">

  <!-- ---------------------- lógica aplicada no login ----------------------- -->
  <script type="module" src="/scripts/utils.js" defer></script>
  <script type="module" src="/scripts/index.js" defer></script>

</head>

<body>
  <div class="left">
    <img src="./assets/ilus-login.png" alt="">
  </div>

  <div class="right">
    <form>
      <div class="form-header">
        <h1 id="tituloLogin">to.do app</h1>
      </div>
      <h3>login</h3>


      <label>
        Email:
        <input id="inputEmail" type="text">
      </label>
      <label>
        Senha:
        <input id="inputPassword" type="password">
      </label>


      <button type="submit" id="btnSubmit">
        <div id="loading-container">
          <div class="loading" hidden></div>
        </div>Acessar
      </button>

  

    </form>
    <div class="ingressar">
      <a class="linkRedirect" href="signup.html">Não possui conta? Crie agora mesmo</a>
    </div>

    <div class="errors">
      <ul>

      </ul>
    </div>
  </div>

</body>

</html>
